<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skipper · Yahoo Integration Test</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0b0b0f; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; color: #f5d547; }
  .sub { color: #a8a8b2; font-size: 13px; margin: 0 0 24px; }
  .card { background: #1d1d27; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .card h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: #a8a8b2; margin: 0 0 12px; }
  button { appearance: none; background: #f5d547; color: #0b0b0f; border: none;
    border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 44px; margin: 4px 4px 4px 0; }
  button.secondary { background: transparent; color: #f5d547;
    border: 1px solid rgba(245,213,71,0.35); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { display: inline-block; padding: 4px 10px; border-radius: 4px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; font-family: ui-monospace, Menlo, monospace; }
  .ok   { background: rgba(110,231,160,0.15); color: #6ee7a0; border: 1px solid rgba(110,231,160,0.3); }
  .warn { background: rgba(245,213,71,0.12);  color: #f5d547; border: 1px solid rgba(245,213,71,0.3); }
  .err  { background: rgba(251,113,133,0.12); color: #fb7185; border: 1px solid rgba(251,113,133,0.3); }
  .out { background: #0b0b0f; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 12px; font-family: ui-monospace, Menlo, monospace;
    font-size: 11px; color: #e0e0e8; max-height: 60vh; overflow: auto;
    white-space: pre-wrap; word-break: break-all; margin-top: 8px; }
  .league-item { padding: 10px; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; margin-bottom: 6px; cursor: pointer; }
  .league-item:hover { border-color: #f5d547; background: rgba(245,213,71,0.04); }
  .league-item .meta { font-size: 11px; color: #a8a8b2; margin-top: 2px; }
  .pill { display: inline-block; padding: 2px 7px; border-radius: 3px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    font-family: ui-monospace, Menlo, monospace; margin-right: 4px; }
  .pill.points { background: rgba(123,104,238,0.2); color: #a594f5; }
  .pill.cats   { background: rgba(245,213,71,0.15); color: #f5d547; }
  .pill.roto   { background: rgba(251,113,133,0.15); color: #fb7185; }
  a { color: #f5d547; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Skipper · Yahoo Integration Test</h1>
  <p class="sub">Verifies the <code>skipper-yahoo.js</code> module works end-to-end against your real Yahoo leagues.</p>

  <div class="card">
    <h2>Connection</h2>
    <div id="conn-status"></div>
    <div style="margin-top: 12px;">
      <button id="connect-btn">Connect with Yahoo</button>
      <button id="disconnect-btn" class="secondary">Disconnect</button>
    </div>
  </div>

  <div class="card" id="leagues-card" style="display:none;">
    <h2>Your Leagues</h2>
    <button id="load-leagues-btn">Load leagues</button>
    <div id="leagues-out"></div>
  </div>

  <div class="card" id="data-card" style="display:none;">
    <h2>Test fetches for selected league</h2>
    <div id="selected-league" style="font-size:13px;color:#a8a8b2;margin-bottom:12px;"></div>
    <button id="fetch-matchups">Matchups</button>
    <button id="fetch-standings">Standings</button>
    <button id="fetch-roster">Roster</button>
    <button id="fetch-cat-breakdown" class="secondary">Category breakdown (cats leagues only)</button>
    <div id="fetch-status" style="margin-top:12px;"></div>
    <pre class="out" id="fetch-out">(no data yet)</pre>
  </div>
</div>

<script type="module">
  import { SkipperYahoo } from './skipper-yahoo.js';

  const yahoo = new SkipperYahoo();
  const connStatus = document.getElementById('conn-status');
  const leaguesCard = document.getElementById('leagues-card');
  const dataCard = document.getElementById('data-card');
  let selectedLeague = null;

  // Step 1 — capture tokens if returning from OAuth
  const captured = yahoo.captureTokensFromUrl();
  if (captured) console.log('[test] Tokens captured from URL');

  function refreshConnUI() {
    if (yahoo.isConnected()) {
      connStatus.innerHTML = `<span class="status ok">Connected</span>`;
      leaguesCard.style.display = 'block';
    } else {
      connStatus.innerHTML = `<span class="status err">Not connected</span>`;
      leaguesCard.style.display = 'none';
      dataCard.style.display = 'none';
    }
  }
  refreshConnUI();

  document.getElementById('connect-btn').addEventListener('click', () => {
    window.location.href = yahoo.authUrl();
  });

  document.getElementById('disconnect-btn').addEventListener('click', () => {
    yahoo.disconnect();
    refreshConnUI();
  });

  document.getElementById('load-leagues-btn').addEventListener('click', async () => {
    const out = document.getElementById('leagues-out');
    out.innerHTML = '<span class="status warn">Loading…</span>';
    try {
      const leagues = await yahoo.getLeagues();
      if (!leagues.length) {
        out.innerHTML = '<span class="status warn">No leagues found</span>';
        return;
      }
      const html = leagues.map((l, i) => {
        const normalized = SkipperYahoo.normalizeScoring(l.scoring_type);
        return `
          <div class="league-item" data-idx="${i}">
            <div>
              <span class="pill ${normalized}">${normalized}</span>
              <strong>${l.name}</strong>
            </div>
            <div class="meta">
              ${l.sport.toUpperCase()} · ${l.season} · ${l.num_teams}T · ${l.league_key}
            </div>
          </div>
        `;
      }).join('');
      out.innerHTML = html;
      out.querySelectorAll('.league-item').forEach((el) => {
        el.addEventListener('click', () => {
          const idx = Number(el.dataset.idx);
          selectedLeague = leagues[idx];
          document.getElementById('selected-league').innerHTML =
            `Selected: <strong>${selectedLeague.name}</strong> ` +
            `<span class="pill ${SkipperYahoo.normalizeScoring(selectedLeague.scoring_type)}">` +
            `${SkipperYahoo.normalizeScoring(selectedLeague.scoring_type)}</span> ` +
            `(${selectedLeague.league_key})`;
          dataCard.style.display = 'block';
        });
      });
    } catch (e) {
      out.innerHTML = `<span class="status err">Error</span> ${e.message}`;
    }
  });

  async function runFetch(fn, label) {
    if (!selectedLeague) return;
    const status = document.getElementById('fetch-status');
    const out = document.getElementById('fetch-out');
    status.innerHTML = `<span class="status warn">Loading ${label}…</span>`;
    out.textContent = '';
    try {
      const data = await fn();
      status.innerHTML = `<span class="status ok">${label} OK</span>`;
      out.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      status.innerHTML = `<span class="status err">${label} failed</span>`;
      out.textContent = e.message + '\n\n' + (e.stack || '');
    }
  }

  document.getElementById('fetch-matchups').addEventListener('click', () =>
    runFetch(() => yahoo.getMatchups(selectedLeague.league_key), 'Matchups'));
  document.getElementById('fetch-standings').addEventListener('click', () =>
    runFetch(() => yahoo.getStandings(selectedLeague.league_key), 'Standings'));
  document.getElementById('fetch-roster').addEventListener('click', () =>
    runFetch(() => yahoo.getRoster(selectedLeague.league_key), 'Roster'));
  document.getElementById('fetch-cat-breakdown').addEventListener('click', async () => {
    // Need to get matchups first to find my team keys
    try {
      const m = await yahoo.getMatchups(selectedLeague.league_key);
      const myMatchup = m.matchups.find(x => x.sides.some(s => s.is_mine));
      if (!myMatchup) { alert('No matchup containing your team found'); return; }
      const a = myMatchup.sides[0].team_key;
      const b = myMatchup.sides[1].team_key;
      runFetch(
        () => yahoo.getCategoryBreakdown(selectedLeague.league_key, a, b, m.current_week),
        'Category breakdown'
      );
    } catch (e) {
      document.getElementById('fetch-status').innerHTML =
        `<span class="status err">Cat breakdown failed</span> ${e.message}`;
    }
  });
</script>
</body>
</html>
